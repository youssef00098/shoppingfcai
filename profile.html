<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TechStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="profile.html">your profile</a></li>
            <li><a href="shopping-list.html">all products</a></li>
         <li><a href="sign-up.html">sign up</a></li> 
            <li><a href="contact-us.html">contact-us</a></li>
        </ul>
    </nav>
 <button id="show">dark mode 🌙</button>
    <main>
        <h1>My Profile</h1>
        
        <section class="user-card">
            <div class="user-img-area">
                <img src="IMG_7570.JPG" alt="Profile" id="user-preview">
                <input type="file" id="upload" accept="image/*" style="display: none;">
                <label for="upload" class="upload-btn">Update Photo</label>
            </div>

            <form class="user-form">
                <div class="field">
                    <label>Username</label>
                    <input type="text" value="Youssef Refaat">
                </div>

                <div class="field">
                    <label>Email</label>
                    <input type="email" value="youssef@example.com">
                </div>

                <div class="field">
                    <label>Account Balance</label>
                    <div class="balance-box">$1,250.00</div>
                </div>

                <div class="actions">
                    <button type="submit">Save Changes</button>
                    <button type="button" class="out-btn">Logout</button>
                </div>
            </form>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
